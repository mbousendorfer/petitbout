server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    return 302 /petitbout/;
  }

  location = /petitbout {
    return 301 /petitbout/;
  }

  location = /petitbout/index.html {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location = /petitbout/manifest.webmanifest {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location = /petitbout/env-config.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location = /petitbout/sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location /petitbout/assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location /petitbout/ {
    try_files $uri $uri/ /petitbout/index.html;
  }
}
