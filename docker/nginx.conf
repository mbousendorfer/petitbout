server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /petitbout {
    return 301 /;
  }

  location /petitbout/ {
    return 301 /;
  }

  location = /index.html {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location = /env-config.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store";
    try_files $uri $uri/ /index.html;
  }
}
