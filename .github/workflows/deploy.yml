name: Build Docker image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute build number
        id: build
        run: echo "number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_APP_BUILD_NUMBER=${{ steps.build.outputs.number }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      # SSH maison avec retry : les runners GitHub changent d'IP a chaque essai et
      # le VPS peut blackholer certaines IP (firewall / fail2ban), d'ou un
      # "dial tcp :22 i/o timeout" intermittent. 3 essais espaces de 30s
      # absorbent ces coups durs sans toucher au build (deja termine via needs).
      - name: Pull the new image and restart the service over SSH
        run: |
          set -euo pipefail

          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Script execute sur le VPS. Heredoc non quote => les secrets sont
          # injectes ici par le runner puis transmis via stdin (jamais sur la
          # ligne de commande distante, donc invisibles dans `ps`).
          cat > "$RUNNER_TEMP/remote.sh" <<REMOTE
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          cd "$DEPLOY_PATH"
          docker compose pull
          docker compose up -d
          docker logout ghcr.io
          docker image prune -f
          REMOTE

          for attempt in 1 2 3; do
            echo "::group::Deploiement VPS - essai $attempt/3"
            if ssh -i ~/.ssh/deploy_key \
                   -o StrictHostKeyChecking=accept-new \
                   -o BatchMode=yes \
                   -o ConnectTimeout=30 \
                   -o ServerAliveInterval=15 \
                   -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" 'bash -s' < "$RUNNER_TEMP/remote.sh"; then
              echo "::endgroup::"
              echo "Deploiement reussi a l'essai $attempt."
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -lt 3 ]; then
              echo "Essai $attempt en echec, nouvelle tentative dans 30s..."
              sleep 30
            fi
          done
          echo "Les 3 tentatives de deploiement ont echoue." >&2
          exit 1
